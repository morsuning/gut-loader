<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
    <defs>
        <!-- 背景渐变：深蓝到青色 -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#0f2847" />
            <stop offset="45%" style="stop-color:#163557" />
            <stop offset="100%" style="stop-color:#0a6b6e" />
        </linearGradient>
        <!-- 数据库主体渐变 -->
        <linearGradient id="dbBody" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#f8fafc" />
            <stop offset="100%" style="stop-color:#e2e8f0" />
        </linearGradient>
        <!-- 数据库顶部渐变 -->
        <linearGradient id="dbTop" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff" />
            <stop offset="100%" style="stop-color:#f1f5f9" />
        </linearGradient>
        <!-- 箭头渐变：琥珀色 -->
        <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#fcd34d" />
            <stop offset="100%" style="stop-color:#d97706" />
        </linearGradient>
        <!-- 数据粒子发光 -->
        <radialGradient id="particleGlow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" style="stop-color:#67e8f9;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0" />
        </radialGradient>
        <!-- 阴影滤镜 -->
        <filter id="dbShadow" x="-10%" y="-5%" width="120%" height="120%">
            <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25" />
        </filter>
        <!-- 箭头发光 -->
        <filter id="arrowGlow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <!-- 粒子发光 -->
        <filter id="dotGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- 圆角矩形背景 -->
    <rect x="0" y="0" width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)" />

    <!-- 微妙背景纹理 -->
    <g opacity="0.04" stroke="#ffffff" stroke-width="1.5" fill="none">
        <circle cx="512" cy="512" r="300" />
        <circle cx="512" cy="512" r="400" />
        <circle cx="512" cy="512" r="200" />
    </g>

    <!-- === 数据库圆柱体 === -->
    <g filter="url(#dbShadow)" transform="translate(0, 40)">
        <!-- 数据库圆柱体身体 -->
        <path
            d="M 350 530 L 350 730 C 350 730 350 790 512 790 C 674 790 674 730 674 730 L 674 530 C 674 530 674 590 512 590 C 350 590 350 530 350 530 Z"
            fill="url(#dbBody)" opacity="0.92" />
        <!-- 数据库侧面描边 -->
        <line x1="350" y1="530" x2="350" y2="730" stroke="#94a3b8" stroke-width="2.5" opacity="0.6" />
        <line x1="674" y1="530" x2="674" y2="730" stroke="#94a3b8" stroke-width="2.5" opacity="0.6" />
        <!-- 数据库底部椭圆 -->
        <ellipse cx="512" cy="730" rx="162" ry="60" fill="#e2e8f0" stroke="#94a3b8"
            stroke-width="2.5" opacity="0.8" />
        <!-- 数据库中间分隔线1 -->
        <path d="M 350 620 C 350 680 350 680 512 680 C 674 680 674 620 674 620"
            fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.4" />
        <!-- 数据库中间分隔线2 -->
        <path d="M 350 680 C 350 740 350 740 512 740 C 674 740 674 680 674 680"
            fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.3" />
        <!-- 数据库顶部椭圆 -->
        <ellipse cx="512" cy="530" rx="162" ry="60" fill="url(#dbTop)" stroke="#94a3b8"
            stroke-width="2.5" />
        <!-- 数据库顶部高光 -->
        <ellipse cx="480" cy="520" rx="80" ry="25" fill="#ffffff" opacity="0.3" />
    </g>

    <!-- === 向下数据流箭头 === -->
    <g filter="url(#arrowGlow)">
        <!-- 箭头柄 -->
        <rect x="490" y="200" width="44" height="200" rx="22" fill="url(#arrowGrad)" />
        <!-- 箭头头部 -->
        <polygon points="512,480 440,380 476,380 476,200 548,200 548,380 584,380"
            fill="url(#arrowGrad)" />
    </g>

    <!-- === 数据流粒子 - 左侧流 === -->
    <g filter="url(#dotGlow)">
        <circle cx="390" cy="250" r="10" fill="#67e8f9" opacity="0.9" />
        <circle cx="370" cy="330" r="7" fill="#67e8f9" opacity="0.7" />
        <circle cx="395" cy="410" r="9" fill="#67e8f9" opacity="0.8" />
        <circle cx="380" cy="480" r="6" fill="#67e8f9" opacity="0.5" />
    </g>

    <!-- === 数据流粒子 - 右侧流 === -->
    <g filter="url(#dotGlow)">
        <circle cx="634" cy="270" r="9" fill="#67e8f9" opacity="0.8" />
        <circle cx="650" cy="350" r="7" fill="#67e8f9" opacity="0.7" />
        <circle cx="628" cy="430" r="10" fill="#67e8f9" opacity="0.9" />
        <circle cx="645" cy="500" r="6" fill="#67e8f9" opacity="0.5" />
    </g>

    <!-- === 数据线条 - 表示数据流动 === -->
    <g stroke="#67e8f9" stroke-width="3" stroke-linecap="round" opacity="0.45">
        <!-- 左侧 -->
        <line x1="355" y1="280" x2="385" y2="295" />
        <line x1="345" y1="360" x2="375" y2="375" />
        <line x1="360" y1="440" x2="390" y2="450" />
        <!-- 右侧 -->
        <line x1="645" y1="300" x2="675" y2="315" />
        <line x1="650" y1="380" x2="680" y2="395" />
        <line x1="640" y1="460" x2="670" y2="470" />
    </g>

    <!-- === 顶部小数据块（代表数据源） === -->
    <g opacity="0.6">
        <rect x="430" y="140" width="24" height="24" rx="4" fill="#67e8f9" opacity="0.7" />
        <rect x="466" y="130" width="24" height="24" rx="4" fill="#fbbf24" opacity="0.6" />
        <rect x="534" y="130" width="24" height="24" rx="4" fill="#67e8f9" opacity="0.6" />
        <rect x="570" y="140" width="24" height="24" rx="4" fill="#fbbf24" opacity="0.7" />
        <rect x="500" y="125" width="24" height="24" rx="4" fill="#ffffff" opacity="0.5" />
    </g>
</svg>